<script>

renderGlobals();
renderBlogList();

// Make blog items open the overlay instead of SPA nav
function openPost(slug){
  renderPost(slug);
  document.getElementById('blog-full-list').closest('.blog-body').style.display='none';
  document.querySelector('.phead').style.display='none';
  document.querySelector('.filter-bar')?.closest('.wrap')?.parentElement?.querySelector('.filter-bar') && null;
  document.getElementById('post-overlay').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
  history.pushState({slug},'','#'+slug);
}
document.getElementById('post-back').addEventListener('click',()=>{
  document.getElementById('post-overlay').style.display='none';
  document.querySelector('.blog-body').style.display='';
  document.querySelector('.phead').style.display='';
  history.pushState(null,'','blog.html');
  window.scrollTo({top:0,behavior:'smooth'});
});
window.addEventListener('popstate', e=>{
  if(e.state?.slug){ openPost(e.state.slug); }
  else {
    document.getElementById('post-overlay').style.display='none';
    document.querySelector('.blog-body').style.display='';
    document.querySelector('.phead').style.display='';
  }
});
// Open post on bitem click
document.addEventListener('click', e=>{
  const item = e.target.closest('.bitem');
  if(item){
    const slug = item.dataset.slug;
    if(slug){ e.preventDefault(); openPost(slug); }
  }
});
// Check hash on load
if(location.hash){ openPost(location.hash.slice(1)); }

</script>
